# 공종별 작업허가서 매핑
# 버전: 1.0
# 작성일: 2026-04-25
# 원칙:
#   - required_permits: 해당 공종에서 원칙적으로 항상 필요한 허가서
#   - conditional_permits: 특정 조건(2m 이상, 용접 포함 등)에서 추가되는 허가서
#   - 모든 ID는 document_catalog.yml PTW-xxx 계열에 존재하는 ID

_meta:
  version: "1.0"
  last_updated: "2026-04-25"
  permit_list:
    PTW-001: 밀폐공간 작업 허가서
    PTW-002: 화기작업 허가서
    PTW-003: 고소작업 허가서
    PTW-004: 전기작업 허가서
    PTW-005: 굴착 작업 허가서
    PTW-006: 방사선 투과검사 작업 허가서
    PTW-007: 중량물 인양 작업 허가서
    PTW-008: 임시전기 설치·연결 허가서

mappings:

  # 소방설비
  - trade_id: FIRE_PIPE_INSTALL
    required_permits: [PTW-002, PTW-003]
    conditional_permits:
      - permit_id: PTW-007
        condition: 500kg 이상 중량물 인양 작업 포함 시
    notes: 용접 포함 시 PTW-002, 2m 이상 고소 시 PTW-003 필수

  - trade_id: FIRE_SPRINKLER_INSTALL
    required_permits: [PTW-003]
    conditional_permits:
      - permit_id: PTW-002
        condition: 용접·절단 작업 포함 시
    notes: ""

  - trade_id: FIRE_HYDRANT_PIPE_INSTALL
