# equipment_inspection_requirements.yml
# 장비별 법정·실무 필수 점검 매핑 (최소 세트)
#
# equipment_code: equipment_types.yml의 code
# required_inspections: inspection_types.yml의 inspection_code 목록
# source_type: law | practical | NEEDS_VERIFICATION
# verification_status: confirmed | NEEDS_VERIFICATION

_meta:
  version: "1.0"
  description: 장비별 필수 점검 요건 매핑
  last_updated: "2026-04-24"

requirements:

  # ─── 양중 장비 ────────────────────────────────────────────────

  - equipment_code: EQ_CRANE_TOWER
    required_inspections:
      - INSP_DAILY_PRE_WORK
      - INSP_MONTHLY
      - INSP_SELF_EXAM_ANNUAL
    condition_note: 타워크레인 설치·해체·인상·운용 작업 시
    source_type: law
    legal_basis: 산업안전보건기준에 관한 규칙 제140조 (월 정기), 제143조 (작업 전)
    verification_status: confirmed
    notes: 월 1회 정기점검 + 작업 전 일상점검 + 연 1회 자체검사

  - equipment_code: EQ_CRANE_MOB
    required_inspections:
      - INSP_DAILY_PRE_WORK
      - INSP_SELF_EXAM_ANNUAL
    condition_note: 이동식 크레인 사용 시
    source_type: law
    legal_basis: 산업안전보건기준에 관한 규칙 제146조 (작업 전 점검)
    verification_status: confirmed
    notes: 작업 시작 전 일상점검 + 연 1회 자체검사

  - equipment_code: EQ_HOIST
    required_inspections:
      - INSP_DAILY_PRE_WORK
      - INSP_SELF_EXAM_HALFYEAR
    condition_note: 호이스트 사용 시
    source_type: law
    legal_basis: 산업안전보건기준에 관한 규칙 제154조 이하
    verification_status: NEEDS_VERIFICATION
    notes: 작업 전 일상점검 + 반기 1회 자체검사; 세부 조항 확인 필요

  # ─── 차량계 건설기계 ──────────────────────────────────────────

  - equipment_code: EQ_EXCAV
    required_inspections:
      - INSP_DAILY_PRE_WORK
    condition_note: 굴착기 사용 시
    source_type: law
    legal_basis: 산업안전보건기준에 관한 규칙 제172조 (작업 시작 전 점검)
    verification_status: confirmed
    notes: 작업 시작 전 일상점검 의무

  - equipment_code: EQ_BULLDOZER
    required_inspections:
      - INSP_DAILY_PRE_WORK
    condition_note: 불도저 사용 시
    source_type: law
    legal_basis: 산업안전보건기준에 관한 규칙 제172조
    verification_status: NEEDS_VERIFICATION
    notes: 차량계 건설기계 공통 작업 전 점검; 세부 조항 확인 필요

  # ─── 차량계 하역운반기계 ──────────────────────────────────────

  - equipment_code: EQ_FORKLIFT
    required_inspections:
      - INSP_DAILY_PRE_WORK
      - INSP_SELF_EXAM_ANNUAL
    condition_note: 지게차 사용 시
    source_type: law
    legal_basis: 산업안전보건기준에 관한 규칙 제180조 (작업 시작 전 점검)
    verification_status: confirmed
    notes: 작업 시작 전 일상점검 + 연 1회 자체검사

  # ─── 고소작업 장비 ────────────────────────────────────────────

  - equipment_code: EQ_AWP
    required_inspections:
      - INSP_DAILY_PRE_WORK
      - INSP_MONTHLY
    condition_note: 고소작업대(차량형) 사용 시
    source_type: law
    legal_basis: 산업안전보건기준에 관한 규칙 제86조 이하
    verification_status: NEEDS_VERIFICATION
    notes: 작업 전 일상점검 + 월 1회 정기점검; 세부 조항 확인 필요

  - equipment_code: EQ_SCAFF
    required_inspections:
      - INSP_DAILY_PRE_WORK
      - INSP_WEEKLY
    condition_note: 강관 비계 사용 시
    source_type: law
    legal_basis: 산업안전보건기준에 관한 규칙 제59조~제76조
    verification_status: NEEDS_VERIFICATION
    notes: 작업 전 일상점검 + 주 1회 정기점검; 세부 조항 확인 필요

  # ─── 밀폐공간 장비 ────────────────────────────────────────────

  - equipment_code: EQ_MANHOLE_BLOWER
    required_inspections:
      - INSP_CONFINED_SPACE_GAS
      - INSP_DAILY_PRE_WORK
    condition_note: 밀폐공간 강제 환기 장비 운용 시
    source_type: law
    legal_basis: 산업안전보건기준에 관한 규칙 제619조~제626조 (밀폐공간 작업 전 산소·유해가스 측정)
    verification_status: confirmed
    notes: 작업 전 산소·유해가스 농도 측정 + 장비 일상점검

  # ─── 전기 설비 ────────────────────────────────────────────────

  - equipment_code: EQ_DIST_PANEL
    required_inspections:
      - INSP_DAILY_PRE_WORK
      - INSP_INSULATION_MONTHLY
    condition_note: 분전반 사용 시
    source_type: law
    legal_basis: 산업안전보건기준에 관한 규칙 제301조 이하 (전기작업 안전)
    verification_status: NEEDS_VERIFICATION
    notes: 작업 전 점검 + 월 1회 절연저항 측정; 세부 조항 확인 필요

  - equipment_code: EQ_GENERATOR
    required_inspections:
      - INSP_DAILY_PRE_WORK
      - INSP_INSULATION_MONTHLY
    condition_note: 발전기 사용 시
    source_type: law
    legal_basis: 산업안전보건기준에 관한 규칙 제301조 이하
    verification_status: NEEDS_VERIFICATION
    notes: 작업 전 점검 + 월 1회 절연저항 측정; 세부 조항 확인 필요
