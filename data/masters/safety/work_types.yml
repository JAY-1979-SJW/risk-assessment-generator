# 작업유형 마스터
# 버전: 1.0
# 작성일: 2026-04-24
# 기준: 산업안전보건기준에 관한 규칙 제38조 (작업계획서 대상) + 특별교육 대상 작업
# 원칙: 현재 매핑 파일(work_document/training_requirements)에서 사용 중인 코드만 수록
#       코드값은 기존 매핑 파일의 실제 값 기준 — 임의 변경 금지

_meta:
  version: "1.1"
  total_codes: 10
  last_updated: "2026-04-25"
  note: >
    v1.1: WT_FORMWORK_SHORING / WT_SCAFFOLDING / WT_CONST_EQUIP 3종 추가 (공종별 위험성평가 프리셋 v1 대응).
    매핑 파일(work_document_requirements.yml, work_training_requirements.yml)에서
    사용 중인 코드 + 공종별 프리셋 대상 코드 수록.
    추가 코드는 법령 검토 후 단계적으로 추가.

work_types:

  # ─────────────────────────────────────────────────────────────────────
  # 굴착 작업
  # ─────────────────────────────────────────────────────────────────────
  - code: WT_EXCAVATION
    name: 굴착 작업
    category: excavation
    description: 굴착면의 높이가 2미터 이상이 되는 지반 굴착 작업
    source_type: law
    notes: 산업안전보건기준에 관한 규칙 제38조 제1항 제5호, 제82조

  # ─────────────────────────────────────────────────────────────────────
  # 크레인·양중 작업
  # ─────────────────────────────────────────────────────────────────────
  - code: WT_CRANE_LIFTING
    name: 크레인 인양 작업
    category: lifting
    description: 타워크레인 및 이동식 크레인을 이용한 인양 작업
    source_type: law
    notes: 산업안전보건기준에 관한 규칙 제38조 제1항 제1호

  # ─────────────────────────────────────────────────────────────────────
  # 하역·운반 작업
  # ─────────────────────────────────────────────────────────────────────
  - code: WT_MATERIAL_HANDLING
    name: 하역·운반 작업
    category: transport
    description: 차량계 하역운반기계(지게차 포함)를 사용하는 하역·운반 작업
    source_type: law
    notes: 산업안전보건기준에 관한 규칙 제38조 제1항 제2호

  # ─────────────────────────────────────────────────────────────────────
  # 밀폐공간 작업
  # ─────────────────────────────────────────────────────────────────────
  - code: WT_CONFINED_SPACE
    name: 밀폐공간 작업
    category: confined_space
    description: 산소결핍·유해가스 위험이 있는 밀폐공간 내 작업
    source_type: law
    notes: 산업안전보건기준에 관한 규칙 제619조

  # ─────────────────────────────────────────────────────────────────────
  # 중량물 취급 작업
  # ─────────────────────────────────────────────────────────────────────
  - code: WT_HEAVY_LOAD
    name: 중량물 취급 작업
    category: general
    description: 중량물을 취급하는 작업 (작업계획서 작성 대상)
    source_type: law
    notes: "NEEDS_VERIFICATION — 산업안전보건기준에 관한 규칙 제38조 제1항 제11호 대상 조건 재확인 필요"

  # ─────────────────────────────────────────────────────────────────────
  # 용접 작업
  # ─────────────────────────────────────────────────────────────────────
  - code: WT_WELDING
    name: 용접 작업
    category: general
    description: 가스집합 용접장치를 사용하는 금속 용접·용단 또는 가열 작업
    source_type: law
    notes: 산업안전보건법 시행규칙 별표 5 제2호 (특별교육 대상)

  # ─────────────────────────────────────────────────────────────────────
  # 화학물질 취급 작업
  # ─────────────────────────────────────────────────────────────────────
  - code: WT_CHEMICAL_HANDLING
    name: 화학물질 취급 작업
    category: chemical
    description: 유해화학물질을 취급하는 작업 (MSDS 교육 대상)
    source_type: law
    notes: "NEEDS_VERIFICATION — 산업안전보건법 제114조 적용 범위 및 교육 시간 재확인 필요"

  # ─────────────────────────────────────────────────────────────────────
  # 거푸집 및 동바리 작업  (v1.1 추가)
  # ─────────────────────────────────────────────────────────────────────
  - code: WT_FORMWORK_SHORING
    name: 거푸집 및 동바리 작업
    category: formwork
    description: 거푸집·동바리를 조립·설치·해체하는 작업 및 콘크리트 타설 작업
    source_type: law
    notes: 산업안전보건기준에 관한 규칙 제328조~제337조 (조립도 작성·침하방지·타설·해체)
    related_builders:
      - WP-015  # 거푸집·동바리 작업계획서
      - CL-002  # 거푸집 및 동바리 설치 점검표

  # ─────────────────────────────────────────────────────────────────────
  # 비계 설치·해체 작업  (v1.1 추가)
  # ─────────────────────────────────────────────────────────────────────
  - code: WT_SCAFFOLDING
    name: 비계 설치·해체 작업
    category: scaffolding
    description: 강관·시스템 비계 등의 조립·설치·해체 및 점검 작업
    source_type: law
    notes: 산업안전보건기준에 관한 규칙 제57조~제75조 (비계 설치·점검·해체)
    related_builders:
      - CL-001  # 비계 설치 점검표

  # ─────────────────────────────────────────────────────────────────────
  # 건설장비 일반 작업  (v1.1 추가)
  # ─────────────────────────────────────────────────────────────────────
  - code: WT_CONST_EQUIP
    name: 건설장비 일반 작업
    category: construction_equipment
    description: 굴착기·덤프트럭·롤러 등 차량계 건설기계를 사용하는 토목·건설 작업
    source_type: law
    notes: 산업안전보건기준에 관한 규칙 제196조~제199조 (차량계 건설기계 작업계획서)
    related_builders:
      - CL-003  # 건설장비 일일 사전점검표
