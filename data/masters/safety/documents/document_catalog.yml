      본 서식은 건설장비 일일 사전점검 전용이며, 작업계획서(WP-008/WP-009) 및 장비사용계획서(EQ-001/EQ-002)를 대체하지 않음.
      타워크레인·이동식 크레인·비계·거푸집동바리 전용 점검은 별도 서식으로 관리.
      차량계 건설기계와 차량계 하역운반기계 조항 분리 적용.
      CL-003-L1(차량계 건설기계)은 원문 미수집으로 NEEDS_VERIFICATION 유지 필요.
      지게차 점검 항목: 헤드가드, 백레스트, 좌석안전띠, 포크, 후진경보기·경광등·후방감지기 포함.
      builder v1.0.

