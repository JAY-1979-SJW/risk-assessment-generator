    law_type: OSHA
    source_level: LAW
    clause: 제36조
    title: 위험성평가 실시 의무
    description: >
      사업주는 건설물·기계·화학물질 등에 의한 위험을 평가하고 위험성 감소 대책을
      수립·시행해야 한다.
    applicability:
      document: [RA-001]
      work_type: []
    related_category: [RA]
    source_type: law
    verification_status: confirmed
    notes: 위험성평가 핵심 법조항; 고시 제2023-19호와 병행 적용

  - id: CC-002
