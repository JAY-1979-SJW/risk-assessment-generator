    law_type: OSHA
    source_level: ENFORCEMENT
    clause: 제38조
    title: 사전 작업계획서 작성·이행 의무
    description: >
      굴착·크레인·건설기계·하역운반기계 등 특정 작업 전 작업계획서를 작성하고
      그 계획에 따라 작업해야 한다. 제1항 각 호에 해당 작업 유형이 열거된다.
    applicability:
      document: [WP-001, WP-006, WP-007, WP-008, WP-009]
      work_type: [WT_EXCAVATION, WT_CRANE_LIFTING, WT_MATERIAL_HANDLING]
    related_category: [WP]
    source_type: law
    verification_status: confirmed
    notes: 작업계획서 작성 의무의 핵심 근거

