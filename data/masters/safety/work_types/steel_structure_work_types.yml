trades:

  - trade_id: STEEL_ERECTION
    trade_name: 철골 세우기 작업
    trade_group: 철골
    description: >
      기둥·보·브레이싱·트러스 등 철골 구조재 세우기·인양 작업.
      타워크레인 또는 이동식크레인 사용, 고소 작업 및 중량물 인양 병행.
    enabled: true
    priority: 1
    default_hazards:
      - FALL_FROM_HEIGHT
      - HEAVY_LIFTING
      - FALLING_OBJECT
      - STRUCK_BY_EQUIPMENT
      - CAUGHT_BETWEEN
    required_documents:
      - RA-001
      - RA-004
      - WP-007
      - ED-003
    recommended_documents:
      - PTW-003
      - PTW-007
      - CL-003
      - EQ-007
    required_trainings:
      - EDU_SPECIAL_16H
      - EDU_CONSTRUCTION_BASIC
      - EDU_TBM
    required_permits:
      - PTW-003
      - PTW-007
    common_equipment:
      - tower_crane
      - mobile_crane
      - man_basket
    ppe:
      - safety_helmet
      - safety_harness
      - safety_gloves
      - safety_shoes
      - high_visibility_vest
    source_status: PARTIAL_VERIFIED
    legal_basis:
      - source: MOEL_OSH_STANDARD_RULE
        clause: "제382조~제392조 (철골 조립 시 안전조치)"
        obligation: inspection_required
      - source: MOEL_OSH_STANDARD_RULE
        clause: "제38조 제1항 제1호·제2호 (크레인·이동식크레인 작업계획서)"
        obligation: document_required
      - source: MOEL_OSH_STANDARD_RULE
        clause: "제142조~제148조 (크레인 점검·안전조치)"
        obligation: inspection_required
    notes: >
      철골 세우기 작업 시 작업지휘자 선임 필수(산안규칙 제382조).
      강풍(10m/s 이상) 시 작업 중지 의무(제384조).
      인양 시 줄걸이 전문 자격자 배치 및 PTW-007 발급 필요.
      2m 이상 고소작업 시 안전대 부착설비 설치(제42조).
      볼트 조임 전 임시 고정 와이어로프 또는 클램프 사용 필수.

