    trade_group: 건축
    description: >
      슬래브·기둥·보·벽체 콘크리트 타설 작업.
      콘크리트펌프카·배처플랜트·레미콘 트럭 운반, 진동다짐 포함.
      거푸집·동바리 위 타설 작업으로 붕괴·낙하 위험 높음.
    enabled: true
    priority: 1
    default_hazards:
      - FALL_FROM_HEIGHT
