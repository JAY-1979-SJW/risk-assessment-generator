      - PTW-003
      - CL-002
      - CL-003
      - EQ-009
    required_trainings:
      - EDU_SPECIAL_16H
      - EDU_CONSTRUCTION_BASIC
      - EDU_TBM
    required_permits:
      - PTW-003
    common_equipment:
      - concrete_pump_truck
      - ready_mix_truck
      - vibrator
      - aerial_work_platform
    ppe:
      - safety_helmet
      - safety_harness
      - safety_boots_concrete
      - safety_gloves
      - safety_goggles
    source_status: PARTIAL_VERIFIED
    legal_basis:
      - source: MOEL_OSH_STANDARD_RULE
        clause: "제38조 제1항 제7호 (콘크리트펌프카 작업계획서)"
        obligation: document_required
      - source: MOEL_OSH_STANDARD_RULE
        clause: "제328조~제337조 (거푸집·동바리 설치·해체)"
        obligation: installation_inspection_required
      - source: MOEL_OSH_STANDARD_RULE
        clause: "제341조~제344조 (콘크리트 타설 중 붕괴방지)"
        obligation: inspection_required
    notes: >
      콘크리트펌프카 사용 시 WP-006(또는 별도 EQ 계획서) 필수(산안규칙 제38조 제1항 제7호).
      거푸집·동바리 설치 완료 후 CL-002 점검 의무(제328조).
      타설 중 동바리 침하·이탈 감시자 배치 권장.

