server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://risk-assessment-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # devlog 독립 페이지 (/devlog → devlog.html)
    location = /devlog {
        try_files /devlog.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
