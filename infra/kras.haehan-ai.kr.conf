# risk-assessment-app (kras.haehan-ai.kr) nginx 설정 참조본
# ※ 실제 운영 설정 위치: /home/ubuntu/app/nginx/conf.d/risk-assessment.conf
#    (nginx Docker 컨테이너 마운트 경로, 이 파일은 문서/참조용)

server {
    listen 80;
    server_name kras.haehan-ai.kr;

    # ── 운영 상태 대시보드 (정적 HTML) ────────────────────────────────────────────
    location /status/risk-assessment/ {
        alias /home/ubuntu/apps/risk-assessment-app/app/status/risk-assessment/;
        index risk-assessment.html;
        try_files $uri $uri/ =404;
    }

    # /status/risk-assessment 트레일링 슬래시 없는 경우 redirect
    location = /status/risk-assessment {
        return 301 /status/risk-assessment/;
    }

    # ── 상태 데이터 파일 (.last) ──────────────────────────────────────────────────
    # 전체 로그 디렉토리 노출 금지 — status/ 하위만 제공
    location /status/risk-assessment/data/ {
        alias /home/ubuntu/apps/risk-assessment-app/logs/status/;
        default_type text/plain;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff";
    }

    # ── API health 직접 프록시 (대시보드 live 점검용) ─────────────────────────────
    location = /health {
        proxy_pass         http://localhost:8100/health;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 5s;
    }

    # ── 메인 트래픽 → 웹 컨테이너 (8101) ─────────────────────────────────────────
    location / {
        proxy_pass         http://localhost:8101;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
