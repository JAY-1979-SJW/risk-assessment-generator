services:
  db:
    image: postgres:16-alpine
    container_name: kras-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - kras_pgdata:/var/lib/postgresql/data
    networks:
      - kras-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kras-api
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@kras-db:5432/${POSTGRES_DB}
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kras-net

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: kras-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - api
    networks:
      - kras-net

volumes:
  kras_pgdata:
    name: kras_pgdata

networks:
  kras-net:
    name: kras-net
