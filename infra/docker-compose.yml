services:
  db:
    image: postgres:16-alpine
    container_name: kras-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - kras_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - kras-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kras-api
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@kras-db:5432/${POSTGRES_DB}
      COMMON_DATA_URL: ${COMMON_DATA_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DEVLOG_DIR: /app/docs/devlog
      CHANGE_HISTORY_PATH: /app/logs/change_history.jsonl
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    volumes:
      - ../docs:/app/docs:ro
      - ../logs:/app/logs
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kras-net

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: kras-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - api
    networks:
      - kras-net

volumes:
  kras_pgdata:
    name: kras_pgdata

networks:
  kras-net:
    name: kras-net
