services:
  db:
    image: postgres:16-alpine
    container_name: risk-assessment-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - risk_assessment_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - risk-assessment-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: risk-assessment-api
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@risk-assessment-db:5432/${POSTGRES_DB}
      COMMON_DATA_URL: ${COMMON_DATA_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DEVLOG_DIR: /app/docs/devlog
      CHANGE_HISTORY_PATH: /app/logs/change_history.jsonl
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://kras.haehan-ai.kr}
      KOSHA_ID: ${KOSHA_ID:-}
      KOSHA_PW: ${KOSHA_PW:-}
    volumes:
      - ../docs:/app/docs:ro
      - ../app:/app/app:ro
      - ../engine:/app/engine:ro
      - ../scripts:/app/scripts:ro
      - /home/ubuntu/apps/risk-assessment-app/logs:/app/logs
      - /home/ubuntu/apps/risk-assessment-app/data:/app/data
      - ../data/risk_db/mapping:/app/data/risk_db/mapping:ro
      - /home/ubuntu/apps/risk-assessment-app/backups:/app/backups
      - ../scraper/logs:/app/scraper_logs:ro
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - risk-assessment-net

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: risk-assessment-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - api
    networks:
      - risk-assessment-net

  collector:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: infra-api
    container_name: risk-assessment-collector
    restart: unless-stopped
    command:
      - python3
      - /app/scripts/ops/run_background_collection.py
      - --loop
      - --limit
      - "30"
      - --sleep-seconds
      - "20"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@risk-assessment-db:5432/${POSTGRES_DB}
      COMMON_DATA_URL: ${COMMON_DATA_URL}
      KOSHA_ID: ${KOSHA_ID:-}
      KOSHA_PW: ${KOSHA_PW:-}
      OPS_LOG_PATH: /app/logs/background_collection.log
      OPS_PID_PATH: /app/logs/background_collection.pid
      OPS_QUEUE_DIR: /app/data/ops
      DATA_DIR: /app/data
    volumes:
      - ../app:/app/app:ro
      - ../scripts:/app/scripts:ro
      - /home/ubuntu/apps/risk-assessment-app/logs:/app/logs
      - /home/ubuntu/apps/risk-assessment-app/data:/app/data
      - ../data/risk_db/mapping:/app/data/risk_db/mapping:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - risk-assessment-net

volumes:
  risk_assessment_pgdata:
    name: risk-assessment-pgdata
    external: true

networks:
  risk-assessment-net:
    name: risk-assessment-net
